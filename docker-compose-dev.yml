
name: zitadel-login

volumes:
  pnpm-dev-store:


services:

  login-dev:
    image: node:24-alpine
    container_name: zitadel-login-dev
    working_dir: /app

    command: >
      sh -c "corepack enable && 
             pnpm install --filter ./apps/login... && 
             cd apps/login && 
             pnpm dev"

    ports:
      - "3000:3000"

    environment:
      - NODE_ENV=development
      - PNPM_HOME=/pnpm
      - PATH=/pnpm:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - WATCHPACK_POLLING=true
      - npm_config_store_dir=/pnpm/store
      - npm_config_package_import_method=copy

    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/node_modules
      - /app/apps/docs/node_modules
      - /app/apps/login/node_modules
      - /app/packages/client/node_modules
      - /app/packages/zitadel-proto/node_modules
      - /app/packages/zitadel-client/node_modules
      - pnpm-dev-store:/pnpm/store
